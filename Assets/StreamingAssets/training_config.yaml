# Конфиг параметров обучения.
#
# Переопределяет публичные поля компонентов значениями отсюда — не нужно
# открывать Unity/пересобирать билд, чтобы поменять параметр между запусками
# headless-обучения (mlagents-learn --env=Build.exe). Читается один раз при
# старте, до генерации первой арены.
#
# Формат: секция — имя класса компонента (без отступа), ключ — точное имя
# его публичного поля, с отступом в 2 пробела (как в инспекторе, но без
# пробелов, camelCase). Поддерживаются числа (float/int), true/false, строки
# и пары вида [x, y] для Vector2/Vector2Int.
#
# Ниже уже прописаны все переопределяемые параметры со значениями,
# соответствующими текущим настройкам в инспекторе, и разбиты на разделы —
# так же, как в самом инспекторе. Ничего раскомментировать не нужно: просто
# меняйте нужные числа перед запуском билда.
#
# Поля-ссылки на объекты сцены (Transform/GameObject/LayerMask и т.п., такие
# как Robot/Target Ball/Box Prefab/Obstacle Mask/Collision Obstacle Mask)
# конфиг не поддерживает — их можно назначить только в инспекторе.

RobotBrain:
  # --- Inference I/O source ---
  regenerateEveryEpisodes: 10

  # --- Основные награды и штрафы ---
  wallPenalty: -0.01
  wallProximityPenalty: 0
  collisionPenaltyCooldown: 0.5
  moveRewardScale: 0.01
  gripReward: 1
  outOfBoundsPenalty: -0.5

  # --- Границы среды ---
  arenaHalfExtents: [300, 300]
  fallDistance: 3
  arenaEscapeMargin: 2

  # --- Ограничения эпизода ---
  noDetectionSteps: 100
  stepPenalty: -0.0002
  grabAttemptReward: 0.1

  # --- Ready-to-Grab zone ---
  grabZoneRadius: 1

  # --- Коэффициенты наград (дополнительные) ---
  smoothnessPenaltyScale: 0.002
  cameraRewardScale: 0.02
  cameraAngleDeadZone: 0.05
  cameraRewardClamp: 0.02
  failedGrabPenalty: -0.1

  # --- Speed Penalty in Grab Zone ---
  speedPenaltyThresholdLinear: 0.2
  speedPenaltyThresholdAngular: 30
  speedPenaltyAmount: -0.05

  # --- Spawn Randomization ---
  spawnHalfExtents: [15, 15]
  randomizeSpawn: true
  randomizeBall: true
  minSpawnDistance: 2
  isTraining: true

  # --- Domain Randomization ---
  randomizeMass: true
  randomizeMotorParams: true
  addUltrasonicNoise: true
  enableBurstDropout: true
  enableCommandLatency: true

  # --- Sensor Faults ---
  enableIRFaults: true
  irFaultProbability: 0.1
  enableUltrasonicFaults: true
  ultrasonicFaultProbability: 0.15

EnvironmentManager:
  # --- Масштабирование мира ---
  globalScale: 10

  # --- Базовые настройки арены ---
  baseArenaSize: [3, 6]
  boxCount: 10
  baseSafeRadius: 0.3
  scatterMargin: 0.5
  maxBallDistanceFromFarWall: 1.15

  # --- Настройки границ (Стены) ---
  createWalls: true
  visibleWalls: true
  baseWallHeight: 0.5

ArenaSpawner:
  # --- Пол ---
  floorMargin: 1.2

  # --- Настройки размножения ---
  arenaCount: 30
  spacing: 100
  arenasPerRow: 4

TrackController:
  # --- Motion ---
  moveSpeed: 3
  turnSpeed: 120
  turnK: 0.3
  maxLinearCmd: 0.25

  # --- Motor PWM simulation ---
  motorDeadzone: 10
  minMotorPwm: 35
  pwmScale: 200

VirtualSensors:
  # --- Датчики ---
  irDistance: 2.4
  gripperDistance: 0.7
  ultrasonicMaxDistance: 50
  ultrasonicRayCount: 10
  ultrasonicAngle: 45

SimulatedYoloCamera:
  # --- Camera simulation ---
  maxVisibleDistance: 30
  horizontalFOV: 40
  cameraAspectRatio: 1.3333333

  # --- Domain randomization ---
  randomizeHorizontalFOV: true
  horizontalFOVRange: [35, 55]
  verticalTiltRange: [-5, 5]

  # --- Sensor randomization ---
  randomizeSensorEffects: true
  angleNoiseStdDevRange: [0, 0.03]
  detectionDropoutRange: [0, 0.1]
  latencyMeasurementsRange: [0, 2]
